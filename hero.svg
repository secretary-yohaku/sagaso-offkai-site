<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景: 佐賀の風景イメージ (山、川、桜) -->
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70b4e7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8dd3c6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#sky)" />

  <!-- 山 -->
  <path d="M0 200 L300 100 L600 150 L900 80 L1200 120 L1200 400 L0 400 Z" fill="#4a90e2" opacity="0.3" />

  <!-- 川 -->
  <path d="M0 300 Q300 280 600 320 T1200 300 L1200 400 L0 400 Z" fill="#5cb8e6" opacity="0.5" />

  <!-- 桜の木 -->
  <circle cx="200" cy="250" r="30" fill="#ffb3ba" opacity="0.7" />
  <circle cx="220" cy="230" r="25" fill="#ffb3ba" opacity="0.7" />
  <circle cx="180" cy="240" r="20" fill="#ffb3ba" opacity="0.7" />
  <rect x="195" y="280" width="10" height="40" fill="#8b4513" />

  <!-- 人物: 交流シーン (シンプルな線画) -->
  <!-- 人1 -->
  <circle cx="400" cy="300" r="15" fill="#fff" stroke="#333" stroke-width="2" />
  <line x1="400" y1="315" x2="400" y2="350" stroke="#333" stroke-width="3" />
  <line x1="400" y1="330" x2="385" y2="340" stroke="#333" stroke-width="2" />
  <line x1="400" y1="330" x2="415" y2="340" stroke="#333" stroke-width="2" />

  <!-- 人2 -->
  <circle cx="450" cy="300" r="15" fill="#fff" stroke="#333" stroke-width="2" />
  <line x1="450" y1="315" x2="450" y2="350" stroke="#333" stroke-width="3" />
  <line x1="450" y1="330" x2="435" y2="340" stroke="#333" stroke-width="2" />
  <line x1="450" y1="330" x2="465" y2="340" stroke="#333" stroke-width="2" />

  <!-- 人3 -->
  <circle cx="500" cy="300" r="15" fill="#fff" stroke="#333" stroke-width="2" />
  <line x1="500" y1="315" x2="500" y2="350" stroke="#333" stroke-width="3" />
  <line x1="500" y1="330" x2="485" y2="340" stroke="#333" stroke-width="2" />
  <line x1="500" y1="330" x2="515" y2="340" stroke="#333" stroke-width="2" />

  <!-- 交流の線 (話しているイメージ) -->
  <path d="M415 290 Q430 280 445 290" stroke="#333" stroke-width="2" fill="none" />
  <path d="M465 290 Q480 280 495 290" stroke="#333" stroke-width="2" fill="none" />

  <!-- 中央スペース: テキスト重ね用 (透明) -->
  <rect x="300" y="150" width="600" height="100" fill="none" />
</svg>